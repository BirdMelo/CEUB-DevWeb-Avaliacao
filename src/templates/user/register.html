<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Registrar Usuário</title>
</head>
<body>
    <h1>Criar uma nova conta</h1>
    
    <form method="POST">
        <div>
            <label for="name">Seu Nome:</label><br>
            <input type="text" id="name" name="name" required placeholder="Digite seu nome completo">
        </div>
        <br>
        <button type="submit">Registrar</button>
    </form>

    <br>
    <a href="{{ url_for('user.logout') }}">Já tem uma conta? Faça login aqui.</a>
    <br>
    <a href="{{ url_for('home.index') }}">Voltar para o Início</a>
</body>
</html>
