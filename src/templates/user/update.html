<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Atualizar Usuário</title>
</head>
<body>
    <h1>Atualizar dados de: {{ user.name }}</h1>
    
    <form method="POST">
        <div>
            <label for="name">Novo Nome:</label><br>
            <input type="text" id="name" name="name" value="{{ user.name }}" required>
        </div>
        <br>
        <button type="submit">Salvar Alterações</button>
    </form>
</body>
</html>
