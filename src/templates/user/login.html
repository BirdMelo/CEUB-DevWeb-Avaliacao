<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
</head>
<body>
    <h1>Entrar no Sistema</h1>
    
    <form method="POST">
        <div>
            <label for="name">Seu Nome de Usuário:</label><br>
            <input type="text" id="name" name="name" required placeholder="Digite seu nome">
        </div>
        <br>
        <button type="submit">Entrar</button>
    </form>

    <br>
    <a href="{{ url_for('user.register') }}">Ainda não tem conta? Registre-se aqui.</a>
    <br>
    <a href="{{ url_for('home.index') }}">Voltar para o Início</a>
</body>
</html>
